name: Generate Profile Metrics and Snake

on:
  # تحديث يومي في منتصف الليل (توقيت UTC)
  schedule:
    - cron: "0 0 * * *"
  # السماح بالتشغيل اليدوي للسكريبت متى شئت
  workflow_dispatch:
  # التشغيل التلقائي عند أي تعديل على الـ README (اختياري، يمكنك حذفه لاحقاً)
  push:
    branches:
      - main

jobs:
  generate-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate github-metrics.svg
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Ahmed-Al-Aini
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Riyadh # يمكنك تغييرها لمنطقتك الزمنية
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

  generate-snake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Ahmed-Al-Aini
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Push Snake to Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
